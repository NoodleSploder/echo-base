[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The real URL is injected at runtime by env.py from app.core.config.Settings
# so config/config.yaml and ECHO_BASE_* env vars stay the single source of
# truth. This placeholder is only used if env.py is bypassed entirely.
sqlalchemy.url = sqlite+aiosqlite:///../data/echo-base.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
